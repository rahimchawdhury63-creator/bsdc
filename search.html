<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="search-page-title">Search — BSDC</title>
  <meta name="description" content="Search questions, wikis, blogs, and code snippets on BSDC — Bangladesh Software Development Community." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://www.bsdc.info.bd/search" />
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico" />
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<header class="navbar" role="banner">
  <div class="container navbar-inner">
    <a href="/" class="navbar-brand" aria-label="BSDC Home">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <rect width="36" height="36" rx="8" fill="#006A4E"/>
        <text x="18" y="25" font-family="Inter,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">B</text>
        <circle cx="28" cy="8" r="4" fill="#FFFFFF" opacity="0.3"/>
      </svg>
      <span class="brand-text">BSDC</span>
    </a>
    <nav class="navbar-actions" aria-label="Main navigation">
      <a href="/" class="btn btn-ghost btn-sm">Home</a>
      <a href="/ask" class="btn btn-primary btn-sm">Ask</a>
      <div class="nav-auth" id="nav-auth">
        <a href="/login" class="btn btn-ghost btn-sm">Login</a>
        <a href="/register" class="btn btn-primary btn-sm">Join</a>
      </div>
      <div class="nav-user hidden" id="nav-user">
        <div class="avatar-menu" id="avatar-menu-wrapper">
          <button class="avatar-btn" id="avatar-btn" aria-label="User menu" aria-expanded="false">
            <img src="/assets/img/avatar-placeholder.svg" id="nav-avatar" alt="User" width="34" height="34" />
          </button>
          <div class="dropdown-menu" id="avatar-dropdown" role="menu">
            <a href="#" id="dropdown-profile" role="menuitem">My Profile</a>
            <hr/>
            <button id="logout-btn" role="menuitem">Logout</button>
          </div>
        </div>
      </div>
    </nav>
  </div>
</header>

<main class="container search-page" id="main-content" role="main">

  <div class="search-header">
    <h1 style="font-size:1.5rem;font-weight:800;color:#1E293B;margin-bottom:16px;">Search BSDC</h1>

    <!-- Search Bar -->
    <div class="search-bar-large">
      <div class="search-wrapper" style="flex:1;">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-input" class="form-input" style="padding-left:46px;font-size:1.05rem;" placeholder="Search questions, wikis, code snippets, projects..." autocomplete="off" aria-label="Search BSDC" />
      </div>
      <button class="btn btn-primary" id="search-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
    </div>

    <div id="search-results-info" class="search-results-info" role="status" aria-live="polite"></div>
  </div>

  <!-- Filters -->
  <div class="search-filters" role="group" aria-label="Filter results">
    <button class="search-filter-btn active" data-filter="all">All</button>
    <button class="search-filter-btn" data-filter="question">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Questions
    </button>
    <button class="search-filter-btn" data-filter="wiki">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      Wikis
    </button>
    <button class="search-filter-btn" data-filter="blog">Blogs</button>
    <button class="search-filter-btn" data-filter="snippet">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;" aria-hidden="true"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Snippets
    </button>
    <button class="search-filter-btn" data-filter="project">Projects</button>

    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;font-size:0.825rem;color:#64748B;">
      Sort:
      <select id="search-sort" class="form-select" style="padding:6px 10px;font-size:0.825rem;width:auto;">
        <option value="relevance">Relevance</option>
        <option value="latest">Latest</option>
        <option value="votes">Most Voted</option>
        <option value="views">Most Viewed</option>
      </select>
    </div>
  </div>

  <!-- Results -->
  <div id="search-results" aria-live="polite" aria-label="Search results">
    <!-- Empty state initially -->
    <div id="search-empty-state" style="text-align:center;padding:80px 20px;color:#64748B;">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5" style="margin:0 auto 20px;" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <h2 style="font-size:1.1rem;color:#94A3B8;margin-bottom:8px;">Search BSDC</h2>
      <p style="font-size:0.875rem;">Enter a keyword to find questions, wikis, code snippets, and more.</p>
    </div>
  </div>

  <!-- Load More -->
  <div id="search-load-more" class="hidden" style="text-align:center;padding:20px 0;">
    <button class="btn btn-outline" id="search-load-more-btn">Load More Results</button>
  </div>

</main>

<div class="toast-container" id="toast-container" aria-live="assertive"></div>

<footer class="footer" role="contentinfo" style="margin-top:60px;">
  <div class="container footer-inner">
    <div class="footer-bottom">
      <p>© 2026 Bangladesh Software Development Community (BSDC) — Founded by Rizwan Rahim Chowdhury</p>
    </div>
  </div>
</footer>

<script type="module" src="/assets/js/firebase-init.js"></script>
<script type="module" src="/assets/js/auth.js"></script>
<script type="module" src="/assets/js/search.js"></script>
</body>
</html>
