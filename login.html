<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — BSDC | Bangladesh Software Development Community</title>
  <meta name="description" content="Login to BSDC — Bangladesh Software Development Community. Access your developer profile, ask questions, and share knowledge." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://www.bsdc.info.bd/login" />
  <link rel="icon" type="image/x-icon" href="/assets/img/favicon.ico" />
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Login — BSDC",
    "url": "https://www.bsdc.info.bd/login",
    "isPartOf": { "@type": "WebSite", "name": "Bangladesh Software Development Community", "url": "https://www.bsdc.info.bd" }
  }
  </script>
</head>
<body>

<a href="#main-content" class="skip-link">Skip to main content</a>

<div class="auth-page" id="main-content">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <svg width="40" height="40" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="36" height="36" rx="8" fill="#006A4E"/>
        <text x="18" y="25" font-family="Inter,sans-serif" font-size="16" font-weight="800" fill="#FFFFFF" text-anchor="middle">B</text>
        <circle cx="28" cy="8" r="4" fill="#FFFFFF" opacity="0.3"/>
      </svg>
      <span style="font-size:1.4rem;font-weight:800;color:#006A4E;">BSDC</span>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to Bangladesh Software Development Community</p>

    <!-- Social Auth -->
    <div class="social-auth" role="group" aria-label="Social sign-in options">

      <button class="social-btn" id="google-btn" aria-label="Sign in with Google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <button class="social-btn" id="github-btn" aria-label="Sign in with GitHub">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
        Continue with GitHub
      </button>

      <button class="social-btn" id="yahoo-btn" aria-label="Sign in with Yahoo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#6001D2" aria-hidden="true">
          <path d="M12.013 8.783l2.954-7.306H18.5l-4.97 11.935v5.98h-3.06v-5.98L5.5 1.477h3.562l2.951 7.306z"/>
        </svg>
        Continue with Yahoo
      </button>

    </div>

    <div class="divider">or sign in with email</div>

    <!-- Email Form -->
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input
          type="email"
          id="login-email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
          required
          aria-required="true"
        />
        <span class="form-error" id="email-error">Please enter a valid email.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">
          Password
          <a href="#" id="forgot-link" style="float:right;font-size:0.8rem;color:#006A4E;font-weight:500;">Forgot password?</a>
        </label>
        <div style="position:relative;">
          <input
            type="password"
            id="login-password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
            aria-required="true"
            style="padding-right:44px;"
          />
          <button type="button" id="toggle-password" aria-label="Toggle password visibility" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#64748B;">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="form-error" id="password-error">Please enter your password.</span>
      </div>

      <button type="submit" class="btn btn-primary w-full" id="login-submit" style="margin-top:4px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Sign In
      </button>
    </form>

    <!-- Reset Password (hidden by default) -->
    <div id="reset-section" class="hidden" style="margin-top:16px;">
      <div class="divider">reset password</div>
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reset-email">Enter your email to reset</label>
          <input type="email" id="reset-email" class="form-input" placeholder="you@example.com" autocomplete="email" />
        </div>
        <button type="submit" class="btn btn-outline w-full">Send Reset Email</button>
      </form>
      <button id="cancel-reset" class="btn btn-ghost btn-sm w-full" style="margin-top:8px;">← Back to Login</button>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:0.875rem;color:#64748B;">
      Don't have an account? <a href="/register" style="color:#006A4E;font-weight:600;">Join BSDC Free →</a>
    </p>

  </div>
</div>

<div class="toast-container" id="toast-container" aria-live="assertive"></div>

<script type="module">
import { signInWithGoogle, signInWithGithub, signInWithYahoo, loginWithEmail, resetPassword } from '/assets/js/auth.js';
import { showToast } from '/assets/js/firebase-init.js';

// Social buttons
document.getElementById('google-btn').addEventListener('click', signInWithGoogle);
document.getElementById('github-btn').addEventListener('click', signInWithGithub);
document.getElementById('yahoo-btn').addEventListener('click', signInWithYahoo);

// Password toggle
const togglePwd = document.getElementById('toggle-password');
const pwdInput = document.getElementById('login-password');
togglePwd.addEventListener('click', () => {
  const isText = pwdInput.type === 'text';
  pwdInput.type = isText ? 'password' : 'text';
  document.getElementById('eye-icon').innerHTML = isText
    ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
});

// Login form
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-submit');

  let valid = true;
  document.getElementById('email-error').classList.remove('visible');
  document.getElementById('password-error').classList.remove('visible');

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('email-error').classList.add('visible');
    valid = false;
  }
  if (!password) {
    document.getElementById('password-error').classList.add('visible');
    valid = false;
  }
  if (!valid) return;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    await loginWithEmail(email, password);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Sign In`;
  }
});

// Forgot password
document.getElementById('forgot-link').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('reset-section').classList.remove('hidden');
});
document.getElementById('cancel-reset').addEventListener('click', () => {
  document.getElementById('login-form').classList.remove('hidden');
  document.getElementById('reset-section').classList.add('hidden');
});
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('reset-email').value.trim();
  if (!email) return;
  await resetPassword(email);
});
</script>

</body>
</html>
