<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Post — BSDC | Bangladesh Software Development Community</title>
  <meta name="description" content="Share your knowledge with Bangladesh's developer community. Ask questions, write blog posts, share code snippets, create wikis, and showcase projects on BSDC."/>
  <meta name="robots" content="noindex"/>
  <link rel="canonical" href="https://www.bsdc.info.bd/submit"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23006A4E'/><text y='.9em' font-size='70' x='50%' text-anchor='middle' fill='white' font-weight='900'>B</text></svg>"/>
  <link rel="stylesheet" href="/css/fabric.css"/>
  <link rel="stylesheet" href="/css/main.css"/>
</head>
<body style="background:#F8FAFC">

<div id="navbar"></div>

<main role="main" style="padding:1.5rem 1rem 4rem">
  <!-- Auth Check Banner -->
  <div id="auth-required-banner" style="display:none;max-width:860px;margin:0 auto 1.5rem">
    <div class="alert alert-warning" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <span>🔐 You need to be logged in to post on BSDC.</span>
      <div style="display:flex;gap:0.5rem">
        <a href="/login" class="btn btn-primary btn-sm">Log In</a>
        <a href="/register" class="btn btn-secondary btn-sm">Register</a>
      </div>
    </div>
  </div>

  <div id="submit-container">
    <!-- Rendered by submit.js -->
    <div style="max-width:860px;margin:0 auto;text-align:center;padding:3rem">
      <div class="spinner spinner-lg mx-auto" style="margin-bottom:1rem"></div>
      <p style="color:#64748B">Loading editor...</p>
    </div>
  </div>
</main>

<div id="footer"></div>

<script type="module">
  import '/js/firebase-config.js';
  import '/js/seo.js';
  import '/js/app.js';
  import '/js/post.js';
  import '/js/submit.js';

  window.addEventListener('DOMContentLoaded', async () => {
    window.BSDC.initPage({ activePage: 'submit' });

    window.BSDC.seo.setMeta({
      title: 'Create Post',
      description: 'Share your knowledge with Bangladesh\'s developer community on BSDC',
      url: 'https://www.bsdc.info.bd/submit'
    });

    // Wait for auth
    const user = await window.BSDC.requireAuth('/login');

    // Init submit engine
    window.BSDC.submitEngine.init();

    // Auth watch for re-init
    window.BSDC.auth.subscribe((user) => {
      if (!user) {
        document.getElementById('auth-required-banner').style.display = 'block';
        document.getElementById('submit-container').innerHTML = '';
      }
    });
  });
</script>
</body>
</html>
