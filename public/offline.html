<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B4332" />
    <title>Offline | BSDC</title>
    <style>
      :root{color-scheme:light dark;--primary:#1B4332;--accent:#FFD60A;--surface:#FFFFFF;--text:#1A1A1A;--muted:#5F6368}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,sans-serif;background:linear-gradient(135deg,#1B4332,#2D6A4F);color:var(--text);padding:24px}.card{width:min(100%,560px);background:var(--surface);border-radius:24px;padding:32px;box-shadow:0 24px 80px rgba(0,0,0,.24);text-align:center}.logo{width:80px;height:80px;margin:0 auto 20px;display:block}.title{font-size:clamp(1.5rem,6vw,2.5rem);margin:0 0 12px;color:var(--primary)}.text{font-size:1rem;line-height:1.7;color:var(--muted);margin:0 0 24px}.button{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:999px;background:var(--primary);color:#fff;text-decoration:none;font-weight:700}.button:focus{outline:3px solid var(--accent);outline-offset:3px}@media(max-width:319px){body{padding:12px}.card{padding:20px;border-radius:18px}.logo{width:64px;height:64px}}
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="offline-title">
      <svg class="logo" viewBox="0 0 128 128" role="img" aria-label="BSDC logo"><rect width="128" height="128" rx="28" fill="#1B4332"/><path d="M64 14 108 32v28c0 29.5-17.9 48.9-44 58-26.1-9.1-44-28.5-44-58V32l44-18Z" fill="#2D6A4F" stroke="#FFD60A" stroke-width="5"/><path d="M51 46 34 64l17 18M77 46l17 18-17 18" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M69 40 58 88" fill="none" stroke="#FFD60A" stroke-width="7" stroke-linecap="round"/></svg>
      <h1 class="title" id="offline-title">BSDC is offline</h1>
      <p class="text">Your connection is currently unavailable. Previously cached pages may still open. Reconnect to sync Firebase feed, messages, notifications, and points.</p>
      <a class="button" href="/">Return to home</a>
    </main>
  </body>
</html>
