# =============================================================================
# .github/workflows/deploy.yml
# Cloudflare Pages deploy — runs on every push to main.
# Zero CLI needed locally; everything happens here.
# =============================================================================

name: Deploy BSDC to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger from the Actions tab

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The build script chains: generate:sitemap → generate:rss → vite build
      # All Firebase / ImgBB / Cloudinary / OneSignal vars are injected here so
      # they're baked into the static bundle at build time.
      - name: Build (sitemap + rss + vite)
        env:
          VITE_FIREBASE_API_KEY:        ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:    ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:     ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_SENDER_ID:      ${{ secrets.VITE_FIREBASE_SENDER_ID }}
          VITE_FIREBASE_APP_ID:         ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL:   ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_IMGBB_API_KEY:           ${{ secrets.VITE_IMGBB_API_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME:   ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_API_KEY:      ${{ secrets.VITE_CLOUDINARY_API_KEY }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_ONESIGNAL_APP_ID:        ${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_ADMIN_EMAIL:             ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_ADMIN_PASSKEY:           ${{ secrets.VITE_ADMIN_PASSKEY }}
          VITE_SITE_URL:                ${{ secrets.VITE_SITE_URL }}
          VITE_SITE_NAME:               ${{ secrets.VITE_SITE_NAME }}
          VITE_SITE_SHORT_NAME:         ${{ secrets.VITE_SITE_SHORT_NAME }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: bsdc
          directory:   dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch:      main
