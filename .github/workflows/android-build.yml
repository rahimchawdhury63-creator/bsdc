# =============================================================================
# .github/workflows/android-build.yml
# Builds a debug APK for the BSDC Capacitor wrapper — entirely on GitHub Actions.
# No Android Studio, no local CLI required.
#
# Triggers:
#   - Push to main (auto)
#   - Manual ("Run workflow") from the Actions tab
#
# Output: app-debug.apk uploaded as a workflow artifact.
# =============================================================================

name: Build BSDC Android APK

on:
  push:
    branches: [main]
    paths:
      - 'capacitor/**'
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'vite.config.js'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build the web bundle
        env:
          VITE_FIREBASE_API_KEY:        ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:    ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:     ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_SENDER_ID:      ${{ secrets.VITE_FIREBASE_SENDER_ID }}
          VITE_FIREBASE_APP_ID:         ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL:   ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_IMGBB_API_KEY:           ${{ secrets.VITE_IMGBB_API_KEY }}
          VITE_CLOUDINARY_CLOUD_NAME:   ${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
          VITE_CLOUDINARY_API_KEY:      ${{ secrets.VITE_CLOUDINARY_API_KEY }}
          VITE_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
          VITE_ONESIGNAL_APP_ID:        ${{ secrets.VITE_ONESIGNAL_APP_ID }}
          VITE_SITE_URL:                ${{ secrets.VITE_SITE_URL }}
        run: npm run build

      # First-time bootstrap: if the android/ folder doesn't exist yet,
      # `npx cap add android` creates it deterministically inside CI.
      - name: Ensure Android platform exists
        run: |
          if [ ! -d "android" ]; then
            npx cap add android --confirm
          fi

      - name: Sync web → native shell
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bsdc-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
