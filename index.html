<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <!--
      ============================================================
      BSDC ROOT HTML — SEO CRITICAL FILE
      ============================================================
      This is the FIRST thing crawlers see. Even before React mounts,
      Google/Bing/DuckDuckGo can read these meta tags. Once React
      hydrates, react-helmet-async dynamically OVERRIDES these with
      page-specific values. This dual approach gives us SSR-quality
      SEO without a server.
      ============================================================
    -->

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Primary SEO meta — overridden per-route by react-helmet-async -->
    <title>Bangladesh Software Development Community | BSDC — Learn, Share, Grow</title>
    <meta name="description" content="BSDC is Bangladesh's largest community for software developers and students. Share code, ask questions, find jobs, earn BSDC Points, learn full-stack development, and earn an official certificate." />
    <meta name="keywords" content="Bangladesh developers, BSDC, software development Bangladesh, programming community, full-stack Bangladesh, Bangla coding, developer jobs Bangladesh, learn programming Bangla" />
    <meta name="author" content="Bangladesh Software Development Community" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="language" content="en, bn" />
    <meta name="geo.region" content="BD" />
    <meta name="geo.placename" content="Bangladesh" />
    <meta name="rating" content="general" />
    <meta name="theme-color" content="#1a6b3a" />
    <meta name="msapplication-TileColor" content="#1a6b3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BSDC" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Canonical — react-helmet-async will override per page -->
    <link rel="canonical" href="https://www.bsdc.info.bd/" />

    <!-- Hreflang for Bangla / English support -->
    <link rel="alternate" hreflang="en" href="https://www.bsdc.info.bd/" />
    <link rel="alternate" hreflang="bn" href="https://www.bsdc.info.bd/?lang=bn" />
    <link rel="alternate" hreflang="x-default" href="https://www.bsdc.info.bd/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bangladesh Software Development Community" />
    <meta property="og:title" content="Bangladesh Software Development Community | BSDC" />
    <meta property="og:description" content="Bangladesh's largest developer & student community. Share code, ask questions, find jobs, earn certificates." />
    <meta property="og:url" content="https://www.bsdc.info.bd/" />
    <meta property="og:image" content="https://www.bsdc.info.bd/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="bn_BD" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@bsdc_bd" />
    <meta name="twitter:creator" content="@bsdc_bd" />
    <meta name="twitter:title" content="Bangladesh Software Development Community | BSDC" />
    <meta name="twitter:description" content="Bangladesh's largest developer community. Code, learn, share, earn." />
    <meta name="twitter:image" content="https://www.bsdc.info.bd/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- RSS / Sitemap discovery -->
    <link rel="alternate" type="application/rss+xml" title="BSDC RSS Feed" href="/rss.xml" />
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <!-- Performance: preconnect to external origins we always hit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://bsdc-bd-default-rtdb.asia-southeast1.firebasedatabase.app" />
    <link rel="dns-prefetch" href="https://api.imgbb.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://onesignal.com" />
    <link rel="dns-prefetch" href="https://cdn.onesignal.com" />

    <!-- Fonts: Inter (English) + Hind Siliguri (Bangla). display=swap = no FOIT. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!--
      CRITICAL CSS — Inlined here so the above-fold content paints
      before any external CSS loads. Keeps Largest Contentful Paint low.
    -->
    <style>
      :root {
        --color-primary: #1a6b3a;
        --color-primary-light: #2d9e58;
        --color-primary-dark: #0f4a27;
        --color-bg: #f5f7f6;
        --color-card: #ffffff;
        --color-text: #1a1a2e;
        --color-border: #e0e6e2;
        --nav-height: 60px;
      }
      *,*::before,*::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--color-bg); color: var(--color-text); font-family: 'Inter','Hind Siliguri',system-ui,-apple-system,sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      .bsdc-boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; background: linear-gradient(135deg,#1a6b3a 0%,#0f4a27 100%); color:#fff; z-index: 9999; }
      .bsdc-boot__logo { width: 84px; height: 84px; }
      .bsdc-boot__title { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
      .bsdc-boot__sub { font-size: 13px; opacity: 0.85; }
      .bsdc-boot__bar { width: 160px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 999px; overflow: hidden; }
      .bsdc-boot__bar::after { content:""; display: block; width: 40%; height: 100%; background:#fff; border-radius: 999px; animation: bsdcLoad 1.2s ease-in-out infinite; }
      @keyframes bsdcLoad { 0%{ transform: translateX(-100%);} 100%{ transform: translateX(350%);} }
    </style>

    <!--
      JSON-LD: WebSite + Organization + Sitelinks Searchbox.
      This is what makes Google show a search box right inside our
      result. Page-specific schemas are injected by JsonLD.jsx.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://www.bsdc.info.bd/#website",
          "url": "https://www.bsdc.info.bd/",
          "name": "Bangladesh Software Development Community",
          "alternateName": "BSDC",
          "description": "Bangladesh's largest community for software developers and students.",
          "inLanguage": ["en", "bn"],
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.bsdc.info.bd/search?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://www.bsdc.info.bd/#organization",
          "name": "Bangladesh Software Development Community",
          "alternateName": "BSDC",
          "url": "https://www.bsdc.info.bd/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.bsdc.info.bd/favicon.svg",
            "width": 512,
            "height": 512
          },
          "sameAs": [
            "https://github.com/rahimchawdhury63-creator/bsdc"
          ],
          "foundingLocation": {
            "@type": "Country",
            "name": "Bangladesh"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <!--
      Root mount point for React. We render a "boot screen" first so
      visitors (and crawlers) immediately see branded content rather
      than a blank white page while the JS bundle loads.
    -->
    <div id="root">
      <div class="bsdc-boot" id="bsdc-boot-screen" role="status" aria-label="Loading BSDC">
        <svg class="bsdc-boot__logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="64" height="64" rx="14" fill="#ffffff"/>
          <path d="M16 18h18c5 0 9 4 9 9s-4 9-9 9H22v10h-6V18z" fill="#1a6b3a"/>
          <path d="M22 24v6h12c1.6 0 3-1.4 3-3s-1.4-3-3-3H22z" fill="#ffffff"/>
        </svg>
        <div class="bsdc-boot__title">Bangladesh Software Development Community</div>
        <div class="bsdc-boot__sub">Loading the platform…</div>
        <div class="bsdc-boot__bar"></div>
      </div>
    </div>

    <!--
      noscript fallback — Google still indexes this content.
      Critical for accessibility and for users who block JS.
    -->
    <noscript>
      <div style="padding: 40px; max-width: 720px; margin: 40px auto; background:#fff; border:1px solid #e0e6e2; border-radius: 12px; font-family: Inter, sans-serif;">
        <h1 style="color:#1a6b3a;">Bangladesh Software Development Community (BSDC)</h1>
        <p>Welcome to BSDC — Bangladesh's largest community for software developers and students.</p>
        <p>This application requires JavaScript to be enabled. Please enable JavaScript in your browser settings and reload this page.</p>
        <p>Learn more about BSDC at <a href="https://www.bsdc.info.bd">https://www.bsdc.info.bd</a></p>
      </div>
    </noscript>

    <!-- Main React entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
