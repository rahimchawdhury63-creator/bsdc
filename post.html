<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading... — BSDC</title>
  <meta name="description" content="Bangladesh Software Development Community — Loading post..."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23006A4E'/><text y='.9em' font-size='70' x='50%' text-anchor='middle' fill='white' font-weight='900'>B</text></svg>"/>
  <link rel="stylesheet" href="/css/fabric.css"/>
  <link rel="stylesheet" href="/css/main.css"/>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
</head>
<body>

<div id="navbar"></div>

<main role="main">
  <div class="page-layout-2col" style="padding-top:1.5rem">

    <!-- Main Content -->
    <div>
      <!-- Post Content -->
      <div id="post-container">
        <!-- Skeleton -->
        <div style="background:white;border:1px solid #E2E8F0;border-radius:0.75rem;padding:1.5rem;margin-bottom:1rem">
          <div class="skeleton" style="height:1.5rem;width:80%;margin-bottom:1rem"></div>
          <div class="skeleton skeleton-title" style="margin-bottom:0.75rem"></div>
          <div class="skeleton skeleton-title" style="width:60%;margin-bottom:1.25rem"></div>
          <div class="skeleton-row">
            <div class="skeleton skeleton-avatar"></div>
            <div style="flex:1">
              <div class="skeleton skeleton-text" style="width:35%;margin-bottom:6px"></div>
              <div class="skeleton skeleton-text-sm"></div>
            </div>
          </div>
        </div>
        <div style="background:white;border:1px solid #E2E8F0;border-radius:0.75rem;padding:2rem;margin-bottom:1rem">
          <div class="skeleton skeleton-text" style="margin-bottom:10px"></div>
          <div class="skeleton skeleton-text" style="margin-bottom:10px"></div>
          <div class="skeleton skeleton-text" style="width:85%;margin-bottom:10px"></div>
          <div class="skeleton skeleton-img" style="height:200px;margin:16px 0;border-radius:8px"></div>
          <div class="skeleton skeleton-text" style="margin-bottom:10px"></div>
          <div class="skeleton skeleton-text" style="width:70%"></div>
        </div>
      </div>

      <!-- Answers (for Q&A) -->
      <div id="answers-container" style="margin-bottom:1rem"></div>

      <!-- Answer Form (for Q&A) -->
      <div id="answer-form-container" style="margin-bottom:1rem"></div>

      <!-- Comments -->
      <div style="background:white;border:1px solid #E2E8F0;border-radius:0.75rem;padding:1.5rem;margin-bottom:1rem">
        <h3 style="font-size:1rem;font-weight:800;color:#1E293B;margin-bottom:1rem" id="comments-title">Comments</h3>
        <div id="comments-container">
          <div class="skeleton-row"><div class="skeleton skeleton-avatar"></div><div style="flex:1;background:#F8FAFC;border-radius:0.75rem;padding:0.75rem"><div class="skeleton skeleton-text" style="margin-bottom:6px"></div><div class="skeleton skeleton-text-sm"></div></div></div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar hide-mobile" aria-label="Post sidebar">

      <!-- Related Posts -->
      <div class="widget">
        <div class="widget-header">📌 Related Posts</div>
        <div class="widget-body" id="related-posts">
          <div class="skeleton skeleton-text" style="margin-bottom:10px"></div>
          <div class="skeleton skeleton-text" style="width:80%;margin-bottom:10px"></div>
          <div class="skeleton skeleton-text" style="width:90%"></div>
        </div>
      </div>

      <!-- Author Widget -->
      <div class="widget" id="author-widget">
        <div class="widget-header">👤 About the Author</div>
        <div class="widget-body">
          <div class="skeleton-row">
            <div class="skeleton skeleton-avatar-lg"></div>
            <div style="flex:1">
              <div class="skeleton skeleton-text" style="margin-bottom:6px"></div>
              <div class="skeleton skeleton-text-sm"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tags Widget -->
      <div class="widget" id="post-tags-widget" style="display:none">
        <div class="widget-header">🏷️ Tags</div>
        <div class="widget-body" id="post-tags-list" style="display:flex;flex-wrap:wrap;gap:0.5rem"></div>
      </div>

    </aside>
  </div>
</main>

<div id="footer"></div>

<script type="module">
  import '/js/firebase-config.js';
  import '/js/seo.js';
  import '/js/skeleton.js';
  import '/js/app.js';
  import '/js/post.js';

  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({ appId: "5f367dc9-3fc3-4fd9-b452-e32fa438509b" });
  });

  window.addEventListener('DOMContentLoaded', async () => {
    window.BSDC.initPage({ activePage: '' });

    const slug = window.BSDC.getParam('slug');
    if (!slug) {
      document.getElementById('post-container').innerHTML = `
        <div class="alert alert-error">No post specified. <a href="/">Go home</a></div>
      `;
      return;
    }

    try {
      // Load post
      const post = await window.BSDC.db.getPost(slug);

      if (!post) {
        document.getElementById('post-container').innerHTML = `
          <div style="text-align:center;padding:3rem;background:white;border:1px solid #E2E8F0;border-radius:0.75rem">
            <div style="font-size:4rem;margin-bottom:1rem">😕</div>
            <h2 style="font-weight:800;color:#1E293B;margin-bottom:0.5rem">Post Not Found</h2>
            <p style="color:#64748B;margin-bottom:1.5rem">This post may have been deleted or the URL is incorrect.</p>
            <a href="/" class="btn btn-primary">🏠 Go Home</a>
          </div>
        `;
        window.BSDC.seo.setMeta({ title: 'Post Not Found' });
        return;
      }

      // Store post reference
      window.BSDC._currentPost = post;

      // Set SEO
      window.BSDC.seo.setPostMeta(post);

      // Increment views (non-blocking)
      window.BSDC.db.incrementViews(post.id).catch(() => {});

      // Wait for auth
      await new Promise(resolve => {
        let done = false;
        window.BSDC.auth.subscribe(() => {
          if (!done) { done = true; resolve(); }
        });
      });

      // Render post
      window.BSDC.postEngine.renderPost(post, document.getElementById('post-container'));

      // Load comments title
      const commentsTitle = document.getElementById('comments-title');
      if (commentsTitle) commentsTitle.textContent = `Comments (${post.commentCount || 0})`;

      // Q&A specific
      if (post.type === 'question') {
        // Load answers
        const [answers, comments] = await Promise.all([
          window.BSDC.db.getAnswers(post.id),
          window.BSDC.db.getComments(post.id)
        ]);

        window.BSDC.postEngine.renderAnswers(answers, post, document.getElementById('answers-container'));
        window.BSDC.postEngine.renderAnswerForm(post.id, document.getElementById('answer-form-container'));
        window.BSDC.postEngine.renderComments(comments, post.id, document.getElementById('comments-container'));

      } else {
        // Non-Q&A: just comments
        document.getElementById('answer-form-container').style.display = 'none';
        const comments = await window.BSDC.db.getComments(post.id);
        window.BSDC.postEngine.renderComments(comments, post.id, document.getElementById('comments-container'));
      }

      // Author widget
      if (post.authorId) {
        const authorProfile = await window.BSDC.auth.getProfile(post.authorId);
        if (authorProfile) {
          const authorWidget = document.getElementById('author-widget');
          const initials = window.BSDC.text.avatarInitials(authorProfile.displayName || 'U');
          authorWidget.querySelector('.widget-body').innerHTML = `
            <a href="/profile?u=${authorProfile.username}" style="text-decoration:none;display:flex;align-items:center;gap:0.875rem;margin-bottom:0.875rem">
              <div class="avatar avatar-lg" style="background:#e6f4f0;color:#006A4E;flex-shrink:0">
                ${authorProfile.photoURL
                  ? `<img src="${authorProfile.photoURL}" alt="${authorProfile.displayName}" style="width:56px;height:56px;border-radius:50%;object-fit:cover">`
                  : initials}
              </div>
              <div>
                <div style="font-weight:700;color:#1E293B">${authorProfile.displayName}</div>
                <div style="font-size:0.8rem;color:#64748B">@${authorProfile.username}</div>
                <div style="font-size:0.8rem;color:#006A4E;font-weight:600">${authorProfile.role || 'Member'}</div>
              </div>
            </a>
            ${authorProfile.bio ? `<p style="font-size:0.85rem;color:#64748B;line-height:1.6;margin-bottom:0.75rem">${authorProfile.bio}</p>` : ''}
            <div style="display:flex;gap:1.5rem;margin-bottom:0.875rem">
              <div style="text-align:center">
                <div style="font-weight:800;color:#1E293B">${authorProfile.postCount || 0}</div>
                <div style="font-size:0.7rem;color:#64748B;text-transform:uppercase">Posts</div>
              </div>
              <div style="text-align:center">
                <div style="font-weight:800;color:#1E293B">${authorProfile.reputation || 0}</div>
                <div style="font-size:0.7rem;color:#64748B;text-transform:uppercase">Rep</div>
              </div>
            </div>
            <a href="/profile?u=${authorProfile.username}" class="btn btn-secondary btn-full btn-sm">View Profile</a>
          `;
        }
      }

      // Tags widget
      if (post.tags?.length) {
        const tagsWidget = document.getElementById('post-tags-widget');
        const tagsList = document.getElementById('post-tags-list');
        if (tagsWidget) tagsWidget.style.display = 'block';
        if (tagsList) {
          tagsList.innerHTML = post.tags.map(t =>
            `<a href="/tag?t=${encodeURIComponent(t)}" class="tag">${t}</a>`
          ).join('');
        }
      }

      // Related posts
      if (post.tags?.length) {
        try {
          const related = await window.BSDC.db.getPosts({ tag: post.tags[0], lim: 4 });
          const filtered = related.filter(p => p.id !== post.id).slice(0, 3);
          const relatedEl = document.getElementById('related-posts');
          if (relatedEl && filtered.length > 0) {
            relatedEl.innerHTML = filtered.map(p => `
              <a href="/post?slug=${p.slug}" class="trending-item" style="text-decoration:none">
                <div>
                  <div class="trending-text line-clamp-2" style="font-size:0.85rem;font-weight:600;color:#1E293B;margin-bottom:0.25rem">${p.title}</div>
                  <div style="font-size:0.75rem;color:#64748B">${window.BSDC.time.ago(p.createdAt)}</div>
                </div>
              </a>
            `).join('');
          } else if (relatedEl) {
            relatedEl.innerHTML = '<p style="color:#64748B;font-size:0.875rem">No related posts yet</p>';
          }
        } catch(e) {}
      }

    } catch(err) {
      console.error(err);
      document.getElementById('post-container').innerHTML = `
        <div class="alert alert-error">Failed to load post. Please refresh the page.</div>
      `;
    }
  });
</script>
</body>
</html>
